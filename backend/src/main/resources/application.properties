# Application Configuration
spring.application.name=placement-prep-backend
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/placement_prep_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=hari
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration (Required to create tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# API Keys (REPLACE WITH YOUR ACTUAL KEYS)
glassdoor.api.key=YOUR_GLASSDOOR_API_KEY
glassdoor.api.host=real-time-glassdoor-data.p.rapidapi.com
gemini.api.key=YOUR_GEMINI_API_KEY

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.placementprep=DEBUG
